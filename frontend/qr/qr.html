<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6" id="form-section">
            <h4 class="fw-bold mb-3">Đăng ký tham gia</h4>
            <div class="mb-3 text-start">
                <label class="small fw-bold">Họ và Tên</label>
                <input type="text" id="name" class="form-control" placeholder="Nguyễn Văn A">
            </div>
            <div class="mb-3 text-start">
                <label class="small fw-bold">Email</label>
                <input type="email" id="email" class="form-control" placeholder="example@gmail.com">
            </div>
            <div class="mb-3 text-start">
                <label class="small fw-bold">MSSV</label>
                <input type="text" id="mssv" class="form-control" placeholder="50.01.104.xxx">
            </div>
            <button type="button" id="btn-submit" class="btn btn-primary w-100 py-2" onclick="generateQR(event)">
                ĐĂNG KÝ & NHẬN VÉ
            </button>
            <div id="msg" class="mt-2 small"></div>
        </div>

        <div class="col-md-6 text-center">
            <h5 class="fw-bold text-muted mb-3">Thông tin vé đã tạo</h5>
            <div class="qr-preview-box" id="preview-box" style="border: 2px dashed #ccc; padding: 20px; border-radius: 15px;">
                <span class="placeholder-text" id="placeholder">Chưa có mã được tạo</span>
                
                <div id="qr-result" class="d-none">
                    <img id="img" alt="QR Code" width="200" class="mb-3 shadow-sm border rounded">
                    
                    <div class="p-3 bg-white rounded-3 shadow-sm border">
                        <small class="text-muted d-block mb-1">Mã vé (Ticket Code):</small>
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <h4 id="ticket-code" class="fw-bold text-primary mb-0">---</h4>
                            <button class="btn btn-sm btn-outline-primary border-0" onclick="copyCode()" title="Copy mã">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="qr-actions" class="mt-3 d-none">
                <button class="btn btn-outline-dark btn-sm rounded-pill px-3 me-2" onclick="window.print()">
                    <i class="fas fa-print me-1"></i> In vé
                </button>
                <button class="btn btn-outline-primary btn-sm rounded-pill px-3" id="download-btn">
                    <i class="fas fa-download me-1"></i> Tải ảnh QR
                </button>
            </div>
        </div>
    </div>
</div>
