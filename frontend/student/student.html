<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự kiện sinh viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .header-section {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            padding: 80px 0 60px; 
            margin-bottom: 40px;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .btn-back-home {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid #ddd;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .btn-back-home:hover {
            background-color: #fff;
            transform: translateX(-5px);
            color: #0d6efd;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .event-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }

        .event-banner {
            height: 160px;
            background: #eef2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4361ee;
            font-size: 3rem;
        }

        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.9);
            color: #0d6efd;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            backdrop-filter: blur(5px);
            z-index: 2;
        }

        .btn-register {
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: auto; /* Đẩy nút xuống dưới cùng của card */
        }

        .info-item {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>

<div class="header-section text-center">
    <a href="../index.html" class="btn-back-home">
        <i class="fas fa-home me-2"></i> Trang chủ
    </a>

    <div class="container">
        <h1 class="fw-bold display-5">Khám phá Sự kiện</h1>
        <p class="opacity-75">Tham gia ngay để nhận những cơ hội trải nghiệm tuyệt vời</p>
    </div>
</div>

<div class="container mb-5">
    <h3 class="text-center mb-4 fw-bold">📅 Danh sách sự kiện đang diễn ra</h3>
    <div class="row g-4" id="eventList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Đang tìm kiếm sự kiện...</p>
        </div>
    </div>
</div>

<script>
const API = "/api";

async function loadEvents() {
    const eventListContainer = document.getElementById("eventList");
    
    try {
        const res = await fetch(API + "/events");
        const events = await res.json();
        
        // 1. Lấy thời gian hiện tại
        const now = new Date();

        // 2. Lọc sự kiện: Chỉ giữ lại sự kiện chưa kết thúc
        const activeEvents = events.filter(e => {
            // Lấy thời gian kết thúc (linh hoạt giữa endtime và endTime từ API)
            const endTimeStr = e.endtime || e.endTime;
            if (!endTimeStr) return true; // Nếu không có thời gian kết thúc, mặc định vẫn hiện

            const eventEndTime = new Date(endTimeStr);
            return eventEndTime > now; // Chỉ hiện nếu thời gian kết thúc lớn hơn hiện tại
        });

        // 3. Kiểm tra nếu không có sự kiện nào thỏa mãn
        if (!activeEvents || activeEvents.length === 0) {
            eventListContainer.innerHTML = `
                <div class="col-12 text-center py-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/6134/6134065.png" width="100" class="mb-3 opacity-25">
                    <h5 class="text-muted">Hiện chưa có sự kiện nào khả dụng</h5>
                    <p class="small text-muted">Vui lòng quay lại sau nhé!</p>
                </div>
            `;
            return;
        }

        // 4. Hiển thị danh sách sự kiện còn hạn
        eventListContainer.innerHTML = activeEvents.map(e => {
            // Định dạng thời gian hiển thị
            const displayStart = e.time ? new Date(e.time).toLocaleString('vi-VN') : "Chưa cập nhật";
            const displayEnd = (e.endtime || e.endTime) ? new Date(e.endtime || e.endTime).toLocaleString('vi-VN') : "Chưa cập nhật";

            return `
                <div class="col-md-6 col-lg-4">
                    <div class="card event-card shadow-sm h-100 position-relative">
                        <div class="category-badge shadow-sm">Hot Event</div>
                        <div class="event-banner">
                            <i class="fas fa-bolt"></i>
                        </div>
                        <div class="card-body p-4 d-flex flex-column">
                            <h5 class="card-title text-dark fw-bold mb-3">${e.name}</h5>
                            
                            <div class="info-item">
                                <i class="fas fa-map-marker-alt me-2 text-danger"></i>
                                ${e.location || "Chưa cập nhật địa điểm"}
                            </div>
                            
                            <div class="info-item">
                                <i class="fas fa-calendar-alt text-primary me-2"></i>
                                <span class="small fw-bold text-dark">Bắt đầu:</span>
                                <span>${displayStart}</span>
                            </div>

                            <div class="info-item mb-4">
                                <i class="fas fa-clock text-primary me-2"></i>
                                <span class="small fw-bold text-dark">Kết thúc:</span>
                                <span>${displayEnd}</span>
                            </div>

                            <button class="btn btn-primary btn-register w-100 shadow-sm"
                                onclick="register('${e.id}')">
                                <i class="fas fa-id-card me-2"></i> Đăng ký ngay
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

    } catch (err) {
        console.error("Lỗi kết nối:", err);
        eventListContainer.innerHTML = `
            <div class="col-12 text-center text-danger py-5">
                <i class="fas fa-wifi-slash fa-3x mb-3"></i>
                <h5>Không thể kết nối máy chủ!</h5>
                <p class="small text-muted">Hãy chắc chắn rằng backend đang chạy tại localhost:3000</p>
            </div>
        `;
    }
}

function register(eventId) {
    window.location.href = "register.html?eventId=" + eventId;
}

// Gọi hàm khi trang web tải xong
window.onload = loadEvents;
</script>

</body>
</html>
