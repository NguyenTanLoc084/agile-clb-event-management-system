<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sự kiện sinh viên</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Style cho nút Quay lại */
        .btn-back-home {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid #ddd;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        .btn-back-home:hover {
            background-color: #fff;
            transform: translateX(-5px);
            color: #0d6efd;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header-section {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            padding: 80px 0 60px; /* Tăng padding top để không bị nút đè */
            margin-bottom: 40px;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .event-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            background: white;
        }
        .event-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }
        .event-banner {
            height: 160px;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dee2e6;
            font-size: 3rem;
        }
        .category-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.9);
            color: #0d6efd;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            backdrop-filter: blur(5px);
        }
        .btn-register {
            border-radius: 12px;
            padding: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-item {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="header-section text-center">
    <a href="../index.html" class="btn-back-home">
        <i class="fas fa-home me-2"></i> Trang chủ
    </a>

    <div class="container">
        <h1 class="fw-bold display-5">Khám phá Sự kiện</h1>
        <p class="opacity-75">Tham gia ngay để nhận những cơ hội trải nghiệm tuyệt vời</p>
    </div>
</div>

<div class="container mb-5">
    <h3 class="text-center mb-4 fw-bold">📅 Danh sách sự kiện sắp tới</h3>
    <div class="row g-4" id="eventList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Đang tìm kiếm sự kiện...</p>
        </div>
    </div>
</div>

<script>
const API = "http://localhost:3000/api";

async function loadEvents(){
    try {
        const res = await fetch(API + "/events");
        const data = await res.json();

        const eventList = document.getElementById("eventList");
        if (!eventList) return;
        
        const activeEvents = data.filter(e => !e.isHidden);

        if (activeEvents.length === 0) {
            eventList.innerHTML = `
                <div class="col-12 text-center py-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/6134/6134065.png" width="100" class="mb-3 opacity-50">
                    <h5 class="text-muted">Hiện chưa có sự kiện nào đang diễn ra</h5>
                </div>
            `;
            return;
        }

        eventList.innerHTML = activeEvents.map(e => `
            <div class="col-md-6 col-lg-4">
                <div class="card event-card shadow-sm h-100 position-relative">
                    <div class="category-badge shadow-sm">Hot Event</div>
                    <div class="event-banner">
                        <i class="fas fa-calendar-star"></i>
                    </div>
                    <div class="card-body p-4">
                        <h5 class="card-title text-dark fw-bold mb-3">${e.name}</h5>
                        
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt me-2 text-danger"></i>
                            ${e.location || "Chưa cập nhật"}
                        </div>
                        
                        <div class="info-item mb-4">
                            <i class="fas fa-clock me-2 text-primary"></i>
                            ${e.time ? new Date(e.time).toLocaleString('vi-VN') : "Sắp diễn ra"}
                        </div>

                        <button class="btn btn-primary btn-register w-100 shadow-sm"
                            onclick="register('${e.id}')">
                            <i class="fas fa-id-card me-2"></i> Đăng ký tham gia
                        </button>
                    </div>
                </div>
            </div>
        `).join('');

    } catch (err) {
        const el = document.getElementById("eventList");
        if (el) el.innerHTML = `
            <div class="col-12 text-center text-danger">
                <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
                <h5>Không thể kết nối máy chủ!</h5>
            </div>
        `;
    }
}

function register(eventId){
    window.location.href = "register.html?eventId=" + eventId;
}

window.onload = loadEvents;
</script>

</body>
</html>
