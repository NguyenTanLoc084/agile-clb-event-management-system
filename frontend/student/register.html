<!-- ===== SCRUM-97: REGISTER + QR ===== -->

<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tham gia sự kiện</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 0; 
        }
        .btn-back-list {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            background-color: white;
            color: #2e7d32;
            text-decoration: none !important;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .btn-back-list:hover {
            background-color: #e8f5e9;
            transform: translateX(-5px);
            color: #1b5e20;
            border-color: #2e7d32;
        }

        .register-card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: white;
            padding: 40px;
        }
        .event-icon {
            width: 70px;
            height: 70px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 1.8rem;
        }
        .qr-container {
            display: none; 
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            border: 2px dashed #dee2e6;
        }
        #qr-img {
            max-width: 200px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .ticket-info {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-top: 15px;
            border: 1px solid #e9ecef;
        }
        .form-control {
            border-radius: 12px;
            background: #f8f9fc;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <a href="student.html" class="btn-back-list">
                <i class="fas fa-arrow-left me-2"></i> Quay lại danh sách sự kiện
            </a>

            <div class="register-card text-center">
                
                <div id="form-section">
                    <div class="event-icon">
                        <i class="fas fa-id-card"></i>
                    </div>
                    <h4 class="fw-bold mb-1">Thông tin tham gia</h4>
                    <p class="text-muted small mb-4">Vui lòng nhập chính xác để Ban tổ chức ghi nhận điểm danh.</p>

                    <div class="text-start">
                        <div class="mb-3">
                            <label class="small fw-bold text-muted ms-2">Họ và Tên</label>
                            <input id="name" type="text" class="form-control py-2" placeholder="VD: Nguyễn Văn A">
                        </div>

                        <div class="mb-3">
                            <label class="small fw-bold text-muted ms-2">Mã số sinh viên (MSSV)</label>
                            <input id="mssv" type="text" class="form-control py-2" placeholder="VD: 20110123">
                        </div>

                        <div class="mb-4">
                            <label class="small fw-bold text-muted ms-2">Email liên hệ</label>
                            <input id="email" type="email" class="form-control py-2" placeholder="example@gmail.com">
                        </div>
                    </div>

                    <button id="btn-reg" class="btn btn-success btn-lg w-100 rounded-3 fw-bold shadow-sm py-2" onclick="register()">
                        ĐĂNG KÝ & NHẬN VÉ
                    </button>
                    
                    <p class="small text-muted mt-3 mb-0">Event ID: <strong id="display-event-id">---</strong></p>
                </div>

                <div id="result-section" class="qr-container">
                    <h5 class="fw-bold text-success mb-1"><i class="fas fa-check-circle me-1"></i> Đăng ký thành công!</h5>
                    <p class="small text-muted">Vui lòng chụp màn hình hoặc lưu mã QR này.</p>
                    
                    <img id="qr-img" src="" alt="QR Code" class="mb-2">
                    
                    <div class="ticket-info">
                        <small class="text-muted d-block">Mã số vé của bạn:</small>
                        <h5 id="ticket-code" class="fw-bold text-primary mb-0">---</h5>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-outline-primary rounded-3" onclick="window.print()">
                            <i class="fas fa-download me-1"></i> Lưu vé
                        </button>
                        <button class="btn btn-link text-decoration-none text-muted small" onclick="location.reload()">
                            <i class="fas fa-redo me-1"></i> Quay lại trang đăng ký
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="register.js"></script>

</body>
</html>
