<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tham gia sự kiện</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            padding: 40px 0; 
        }
        .register-card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: white;
            padding: 40px;
        }
        .event-icon {
            width: 70px; height: 70px;
            background: #e8f5e9; color: #2e7d32;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 1.8rem;
        }
        #result-section {
            display: none; 
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
            border: 2px dashed #dee2e6;
        }
        #qr-img {
            max-width: 200px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-checkin {
            background: #2e7d32;
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            width: 100%;
            border: none;
            transition: 0.3s;
        }
        .btn-checkin:hover { background: #1b5e20; transform: translateY(-2px); }
        .ticket-info { background: white; border-radius: 12px; padding: 10px; margin-top: 15px; border: 1px solid #e9ecef; }
    </style>
</head>

<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <a href="student.html" class="btn btn-light mb-3 rounded-pill shadow-sm border">
                <i class="fas fa-arrow-left me-2"></i> Quay lại
            </a>

            <div class="register-card text-center">
                <div id="form-section">
                    <div class="event-icon"><i class="fas fa-id-card"></i></div>
                    <h4 class="fw-bold mb-1">Thông tin tham gia</h4>
                    <p class="text-muted small mb-4">Vui lòng nhập chính xác thông tin.</p>

                    <div class="text-start mb-3">
                        <label class="small fw-bold text-muted">Họ và Tên</label>
                        <input id="name" type="text" class="form-control" placeholder="Nguyễn Văn A">
                    </div>
                    <div class="text-start mb-3">
                        <label class="small fw-bold text-muted">MSSV</label>
                        <input id="mssv" type="text" class="form-control" placeholder="20110XXX">
                    </div>
                    <div class="text-start mb-4">
                        <label class="small fw-bold text-muted">Email</label>
                        <input id="email" type="email" class="form-control" placeholder="vi-du@gmail.com">
                    </div>

                    <button type="button" id="btn-submit" class="btn btn-checkin" onclick="register(event)">
                        ĐĂNG KÝ & NHẬN VÉ
                    </button>
                    <div id="msg" class="mt-3 small"></div>
                </div>

                <div id="result-section">
                    <h5 class="fw-bold text-success mb-1"><i class="fas fa-check-circle me-1"></i> Thành công!</h5>
                    <img id="qr-img" src="" alt="QR Code" class="my-3">
                    <div class="ticket-info">
                        <small class="text-muted">Mã vé của bạn:</small>
                        <h5 id="ticket-code" class="fw-bold text-primary mb-0">---</h5>
                    </div>
                    <button class="btn btn-outline-primary w-100 mt-3" onclick="window.print()">
                        <i class="fas fa-print me-1"></i> In / Lưu vé
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="register.js"></script>
</body>
</html>
