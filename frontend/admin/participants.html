<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách đăng ký - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/admin-style.css">

    <style>
        @keyframes highlightUpdate {
            0% { background-color: #e8f5e9; }
            100% { background-color: transparent; }
        }
        .updated-row { animation: highlightUpdate 2s ease-out; }
        .badge { font-size: 0.8rem; padding: 0.5em 0.8em; }
        .event-tag { font-size: 0.85rem; color: #4361ee; background: #eef2ff; padding: 4px 10px; border-radius: 6px; font-weight: 600; }
        .text-mssv { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #2d3436; }
    </style>
</head>

<body>
<div class="admin-wrapper">
    <div class="sidebar shadow">
        <div class="sidebar-header">
            <h5 class="mb-0 text-white"><i class="fas fa-user-shield me-2"></i>ADMIN PANEL</h5>
        </div>
        <div class="py-3">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="event-manager.html"><i class="fas fa-calendar-alt"></i> Quản lý sự kiện</a>
            <a href="create-event.html"><i class="fas fa-plus-circle"></i> Tạo sự kiện mới</a>
            <a href="participants.html" class="active"><i class="fas fa-users"></i> Người tham gia</a>
            <hr class="bg-secondary mx-3">
            <a href="change-password.html"><i class="fas fa-key"></i> Đổi mật khẩu</a>
            <a href="login.html" class="text-warning"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-light bg-white border-bottom mb-4 p-2 rounded-3 shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Hệ thống / <strong>Danh sách đăng ký sự kiện</strong></span>
                <span id="live-status" class="badge bg-success-subtle text-success border border-success rounded-pill">
                    <i class="fas fa-sync fa-spin me-1"></i> Tự động cập nhật
                </span>
            </div>
        </nav>

        <div class="container-fluid p-0">
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4 bg-white">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">CHỌN SỰ KIỆN ĐỂ XEM DANH SÁCH</label>
                        <select id="eventFilter" class="form-select border-0 bg-light"></select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label small fw-bold text-muted">TÌM KIẾM SINH VIÊN</label>
                        <input id="search" class="form-control border-0 bg-light" placeholder="Tên, MSSV hoặc Email...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted">TRẠNG THÁI</label>
                        <select id="statusFilter" class="form-select border-0 bg-light">
                            <option value="All">Tất cả (Đã đăng ký)</option>
                            <option value="checked">Đã tham gia (Checked-in)</option>
                            <option value="absent">Chưa đến (Dự kiến)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">STT</th>
                                <th>Sinh viên</th>
                                <th>MSSV</th>
                                <th>Thông tin sự kiện đã đăng ký</th>
                                <th class="text-center">Trạng thái</th>
                                <th>Giờ điểm danh</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const BASE_URL = "/api"; 
let participants = [];
let eventsMap = {}; 

async function init() {
    await loadEvents();
    await loadData();
    setInterval(() => loadData(true), 3000);
}

async function loadEvents() {
    try {
        const res = await fetch(`${BASE_URL}/events`);
        const events = await res.json();
        const select = document.getElementById("eventFilter");
        
        select.innerHTML = '<option value="All">--- Tất cả sự kiện ---</option>';
        events.forEach(ev => {
            eventsMap[ev.id] = ev;
            select.innerHTML += `<option value="${ev.id}">${ev.name}</option>`;
        });
    } catch (e) { 
        console.error("Lỗi tải sự kiện:", e); 
    }
}

async function loadData(isAuto = false) {
    try {
        const res = await fetch(`${BASE_URL}/participants`);
        const data = await res.json();

        if (JSON.stringify(data) !== JSON.stringify(participants) || !isAuto) {
            participants = data;
            renderTable();
        }
    } catch (e) { 
        console.error("Lỗi kết nối máy chủ khi tải người tham gia!", e); 
        if(!isAuto) {
            document.getElementById("tableBody").innerHTML = 
                '<tr><td colspan="6" class="text-center text-danger">Không thể kết nối máy chủ!</td></tr>';
        }
    }
}

function renderTable() {
    const eventId = document.getElementById("eventFilter").value;
    const status = document.getElementById("statusFilter").value;
    const keyword = document.getElementById("search").value.toLowerCase();
    const tbody = document.getElementById("tableBody");
    const filtered = participants.filter(p => {
        const matchEvent = (eventId === "All") || (String(p.eventId) === String(eventId));
        const matchStatus = (status === "All") || 
                           (status === "checked" && p.checkedIn) || 
                           (status === "absent" && !p.checkedIn);
        const matchSearch = (p.name || "").toLowerCase().includes(keyword) || 
                            (p.mssv || "").toLowerCase().includes(keyword);
        return matchEvent && matchStatus && matchSearch;
    });
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5 text-muted">Chưa có dữ liệu đăng ký nào phù hợp</td></tr>';
        return;
    }
    tbody.innerHTML = filtered.map((p, i) => {
        const eventInfo = eventsMap[p.eventId] || { name: "Sự kiện không xác định" };
        return `
            <tr class="${p.checkedIn ? 'updated-row' : ''}">
                <td class="ps-4 text-muted">${i + 1}</td>
                <td>
                    <div class="fw-bold text-dark">${p.name}</div>
                    <div class="small text-muted">${p.email}</div>
                </td>
                <td><span class="text-mssv">${p.mssv}</span></td>
                <td>
                    <div class="event-tag mb-1"><i class="fas fa-bookmark me-1"></i> ${eventInfo.name}</div>
                </td>
                <td class="text-center">
                    ${p.checkedIn 
                        ? '<span class="badge rounded-pill bg-success text-white">Đã có mặt</span>' 
                        : '<span class="badge rounded-pill bg-warning text-dark">Đang chờ</span>'}
                </td>
                <td class="text-muted small">${p.checkinTime || '---'}</td>
            </tr>
        `;
    }).join('');
}
document.getElementById("eventFilter").addEventListener("change", renderTable);
document.getElementById("statusFilter").addEventListener("change", renderTable);
document.getElementById("search").addEventListener("input", renderTable);

window.onload = init;
</script>
</body>
</html>
