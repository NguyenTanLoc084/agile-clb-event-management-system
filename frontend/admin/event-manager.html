<!-- ===== SCRUM-34: EVENT MANAGER ===== -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sự kiện - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/admin-style.css">
</head>

<body>
<div class="admin-wrapper">
    <div class="sidebar shadow">
        <div class="sidebar-header">
            <h5 class="mb-0 text-white"><i class="fas fa-user-shield me-2"></i>ADMIN PANEL</h5>
        </div>
        <div class="py-3">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="event-manager.html" class="active"><i class="fas fa-calendar-alt"></i> Quản lý sự kiện</a>
            <a href="create-event.html"><i class="fas fa-plus-circle"></i> Tạo sự kiện mới</a>
            <a href="participants.html"><i class="fas fa-users"></i> Người tham gia</a>
            <hr class="bg-secondary mx-3">
            <a href="change-password.html"><i class="fas fa-key"></i> Đổi mật khẩu</a>
            <a href="login.html" class="text-warning"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-light bg-white border-bottom mb-4 p-2 rounded-3 shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1" style="font-size: 1.1rem;">
                    Hệ thống / <strong id="page-title">Quản lý sự kiện</strong>
                </span>
            </div>
        </nav>

        <div class="container-fluid p-0">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h3 class="fw-bold mb-1">📅 Danh sách sự kiện</h3>
                    <p class="text-muted small">Quản lý, chỉnh sửa hoặc tạm ẩn các sự kiện trong hệ thống</p>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary rounded-3 shadow-sm" onclick="load()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <a href="create-event.html" class="btn btn-primary shadow-sm rounded-3">
                        <i class="fas fa-plus me-2"></i>Thêm sự kiện
                    </a>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-muted small text-uppercase fw-bold">
                            <tr>
                                <th class="ps-4 py-3">Tên sự kiện</th>
                                <th class="py-3">Địa điểm</th>
                                <th class="py-3 text-center">Trạng thái</th>
                                <th class="py-3 text-end pe-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="list">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../assets/js/main.js"></script>

<script>
const API = "http://localhost:3000/api/events";

async function load() {
    try {
        const res = await fetch(API);
        const data = await res.json();
        const listBody = document.getElementById("list");

        if (data.length === 0) {
            listBody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-muted">Chưa có sự kiện nào được tạo.</td></tr>`;
            return;
        }

        listBody.innerHTML = data.map(e => `
            <tr class="${e.isHidden ? 'bg-light opacity-75' : ''}">
                <td class="ps-4">
                    <div class="fw-bold text-dark">${e.name}</div>
                </td>
                <td>
                    <span class="text-muted"><i class="fas fa-map-marker-alt me-1"></i> ${e.location}</span>
                </td>
                <td class="text-center">
                    ${e.isHidden 
                        ? '<span class="badge rounded-pill bg-secondary-subtle text-secondary border border-secondary px-3">Đã ẩn</span>' 
                        : '<span class="badge rounded-pill bg-success-subtle text-success border border-success px-3">Hoạt động</span>'}
                </td>
                <td class="text-end pe-4">
                    <div class="btn-group shadow-sm rounded-3 overflow-hidden border">
                        <button class="btn btn-sm btn-white py-2 px-3 border-end" onclick="location.href='edit-event.html?id=${e.id}'" title="Sửa">
                            <i class="fas fa-edit text-primary"></i>
                        </button>
                        <button class="btn btn-sm btn-white py-2 px-3 border-end" onclick="toggle('${e.id}')" title="${e.isHidden ? 'Hiện' : 'Ẩn'}">
                            <i class="fas fa-${e.isHidden ? 'eye' : 'eye-slash'} text-info"></i>
                        </button>
                        <button class="btn btn-sm btn-white py-2 px-3" onclick="del('${e.id}')" title="Xóa">
                            <i class="fas fa-trash-alt text-danger"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    } catch (err) {
        console.error("Lỗi khi tải danh sách:", err);
        document.getElementById("list").innerHTML = `<tr><td colspan="4" class="text-center py-4 text-danger small">Không thể kết nối tới server!</td></tr>`;
    }
}

async function del(id) {
    if (confirm("Bạn có chắc chắn muốn xóa sự kiện này?")) {
        try {
            await fetch(`${API}/${id}`, { method: "DELETE" });
            load();
        } catch (err) {
            alert("Lỗi khi xóa sự kiện.");
        }
    }
}

async function toggle(id) {
    try {
        await fetch(`${API}/${id}/toggle-hide`, { method: "PUT" });
        load();
    } catch (err) {
        alert("Lỗi khi cập nhật trạng thái.");
    }
}
window.onload = load;
</script>

</body>
</html>
