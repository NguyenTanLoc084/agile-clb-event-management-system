<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo sự kiện - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/admin-style.css">
    <style>
        .bg-light-primary { background-color: #eef2ff; }
        .form-control:focus { background-color: #fff !important; box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.15); border: 1px solid #4361ee !important; }
        .sidebar-header img { transition: transform 0.3s ease; }
        .sidebar-header:hover img { transform: scale(1.1); }
    </style>
</head>

<body>
<div class="admin-wrapper">
    <div class="sidebar shadow">
        <div class="sidebar-header text-center">
<h5 class="mb-0 text-white"><i class="fas fa-user-shield me-2"></i>ADMIN PANEL</h5>
        </div>
        <div class="py-3">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="event-manager.html"><i class="fas fa-calendar-alt"></i> Quản lý sự kiện</a>
            <a href="create-event.html" class="active"><i class="fas fa-plus-circle"></i> Tạo sự kiện</a>
            <a href="participants.html"><i class="fas fa-users"></i> Người tham gia</a>
            <hr class="bg-secondary mx-3">
            <a href="change-password.html"><i class="fas fa-key"></i> Đổi mật khẩu</a>
            <a href="login.html" class="text-warning"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-light bg-white border-bottom mb-4 p-2 rounded-3 shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1" style="font-size: 1.1rem;">
                    Hệ thống / <strong id="page-title">Tạo sự kiện mới</strong>
                </span>
            </div>
        </nav>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 p-4 rounded-4 bg-white">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-light-primary p-3 rounded-3 me-3">
                            <i class="fas fa-calendar-plus fa-lg text-primary"></i>
                        </div>
                        <div>
                            <h4 class="fw-bold mb-0">Thông tin sự kiện</h4>
                            <p class="text-muted small mb-0">Điền các thông tin chi tiết để hệ thống tự động mở cổng Check-in</p>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted text-uppercase">Tên sự kiện</label>
                            <input id="name" class="form-control bg-light border-0 py-2" placeholder="Ví dụ: Hội thảo AI 2026">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted text-uppercase">Thời gian bắt đầu</label>
                            <input id="time" type="datetime-local" class="form-control bg-light border-0 py-2">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-muted text-uppercase">Thời gian kết thúc</label>
                            <input id="endTime" type="datetime-local" class="form-control bg-light border-0 py-2">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted text-uppercase">Địa điểm tổ aerobic</label>
                            <input id="location" class="form-control bg-light border-0 py-2" placeholder="Hội trường A, Tòa nhà trung tâm">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label small fw-bold text-muted text-uppercase">Mô tả chi tiết</label>
                            <textarea id="desc" class="form-control bg-light border-0" rows="4" placeholder="Nội dung tóm tắt..."></textarea>
                        </div>

                        <div id="time-error" class="col-md-12 d-none">
                            <div class="alert alert-danger py-2 small mb-0">
                                <i class="fas fa-exclamation-triangle me-2"></i> Lỗi: Giờ kết thúc không thể trước giờ bắt đầu!
                            </div>
                        </div>

                        <div class="col-md-12 mt-4">
                            <button class="btn btn-primary px-5 py-2 fw-bold rounded-3 shadow-sm" onclick="create()">
                                <i class="fas fa-save me-2"></i> LƯU SỰ KIỆN
                            </button>
                            <button class="btn btn-link text-muted" onclick="window.history.back()">Hủy bỏ</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function create() {
    const eventName = document.getElementById("name").value;
    const eventTime = document.getElementById("time").value;
    const eventEndTime = document.getElementById("endTime").value;
    const eventLoc = document.getElementById("location").value;
    const eventDesc = document.getElementById("desc").value;
    const errorMsg = document.getElementById("time-error");
    if (!eventName || !eventTime || !eventEndTime) {
        alert("Vui lòng nhập đầy đủ Tên, Giờ bắt đầu và Giờ kết thúc!");
        return;
    }
    if (new Date(eventEndTime) <= new Date(eventTime)) {
        errorMsg.classList.remove("d-none");
        return;
    } else {
        errorMsg.classList.add("d-none");
    }
    const token = localStorage.getItem("token");

    try {
        const res = await fetch(/api/events", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}` 
            },
            body: JSON.stringify({
                name: eventName,
                time: eventTime,      
                endTime: eventEndTime, 
                location: eventLoc,
                description: eventDesc
            })
        });

        if (res.ok) {
            const result = await res.json();
            alert("✅ Đã lưu sự kiện thành công!");
            window.location.href = "event-manager.html"; 
        } else {
            const errorData = await res.json();
            alert("❌ Lỗi: " + (errorData.message || "Không thể lưu sự kiện"));
        }
    } catch (err) {
        console.error("Lỗi kết nối:", err);
        alert("Không thể kết nối tới máy chủ! Kiểm tra xem Backend đã chạy (node server.js) chưa.");
    }
}
</script>
</body>
</html>
