<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: white;
            border: none;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .status-icon {
            width: 80px; height: 80px;
            background: #fff5f5; color: #e03131;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 2rem;
        }
        .form-control {
            border-radius: 12px; padding: 12px 15px;
            background: #f9fafb; border: 1px solid #e5e7eb;
        }
        .btn-submit {
            background: #4e73df; border: none; border-radius: 12px;
            padding: 12px; font-weight: 600; transition: all 0.3s;
        }
        .btn-submit:hover { background: #224abe; transform: translateY(-2px); }
        #otp-section { display: none; }
    </style>
</head>

<body>

<div class="login-card">
    <div id="email-section">
        <div class="text-center">
            <div class="status-icon">
                <i class="fas fa-envelope-open-text"></i>
            </div>
            <h4 class="fw-bold mb-1">Khôi phục mật khẩu</h4>
            <p class="text-muted small mb-4">Nhập email để nhận mã xác thực OTP.</p>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold">Email quản trị</label>
            <input id="email" type="email" class="form-control" placeholder="admin@example.com">
        </div>

        <button id="btn-send-otp" class="btn btn-primary w-100 btn-submit mb-3" onclick="handleSendOTP()">
            Gửi mã OTP
        </button>

        <div class="text-center">
            <a href="login.html" class="text-decoration-none small text-primary fw-bold">
                <i class="fas fa-arrow-left me-1"></i> Quay lại Đăng nhập
            </a>
        </div>
    </div>

    <div id="otp-section">
        <div class="text-center">
            <div class="status-icon" style="background: #ebfbee; color: #099268;">
                <i class="fas fa-user-shield"></i>
            </div>
            <h4 class="fw-bold mb-1">Xác thực OTP</h4>
            <p class="text-muted small mb-4">Mã OTP đã được gửi đến email của bạn.</p>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold">Mã xác thực (6 số)</label>
            <input id="otp" type="text" class="form-control text-center fw-bold" placeholder="000000" maxlength="6">
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold">Mật khẩu mới</label>
            <input id="new-password" type="password" class="form-control" placeholder="Tối thiểu 6 ký tự">
        </div>

        <button id="btn-reset" class="btn btn-success w-100 btn-submit mb-3" onclick="handleResetPassword()">
            Xác nhận đổi mật khẩu
        </button>

        <div class="text-center">
            <button class="btn btn-link btn-sm text-decoration-none" onclick="location.reload()">
                Thử lại với email khác
            </button>
        </div>
    </div>
</div>

<script>
const API = "https://agile-clb-event-management-system.onrender.com";
async function handleSendOTP() {
    const email = document.getElementById("email").value;
    const btn = document.getElementById("btn-send-otp");

    if (!email) {
        Swal.fire('Lỗi!', 'Vui lòng nhập email!', 'error');
        return;
    }

    try {
        btn.disabled = true;
        btn.innerText = "Đang gửi...";

        const res = await fetch(`${API}/auth/send-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        if (res.ok) {
            Swal.fire('Thành công!', 'Vui lòng kiểm tra email của bạn.', 'success');
            document.getElementById("email-section").style.display = "none";
            document.getElementById("otp-section").style.display = "block";
        } else {
            const data = await res.json();
            Swal.fire('Thất bại', data.message || 'Email không tồn tại!', 'error');
        }
    } catch (err) {
        Swal.fire('Lỗi', 'Không thể kết nối máy chủ!', 'error');
    } finally {
        btn.disabled = false;
        btn.innerText = "Gửi mã OTP";
    }
}
async function handleResetPassword() {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;
    const newPassword = document.getElementById("new-password").value;

    if (!otp || newPassword.length < 6) {
        Swal.fire('Lỗi!', 'Vui lòng nhập đủ OTP và mật khẩu (>=6 ký tự)', 'warning');
        return;
    }

    try {
        const res = await fetch(`${API}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, otp, newPassword })
        });

        if (res.ok) {
            await Swal.fire({
                title: 'Thành công!',
                text: 'Mật khẩu đã được đổi. Vui lòng đăng nhập lại.',
                icon: 'success'
            });
            window.location.href = "login.html";
        } else {
            Swal.fire('Lỗi!', 'Mã OTP không đúng hoặc đã hết hạn.', 'error');
        }
    } catch (err) {
        Swal.fire('Lỗi', 'Không thể thực hiện yêu cầu!', 'error');
    }
}
</script>

</body>
</html>
