<!-- ===== SCRUM-98: CHANGE PASSWORD ===== -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/admin-style.css">
</head>

<body>
<div class="admin-wrapper">
    <div class="sidebar shadow">
        <div class="sidebar-header">
            <h5 class="mb-0 text-white">ADMIN PANEL</h5>
        </div>
        <div class="py-3">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="event-manager.html"><i class="fas fa-calendar-alt"></i> Quản lý sự kiện</a>
            <a href="create-event.html"><i class="fas fa-plus-circle"></i> Tạo sự kiện</a>
            <a href="participants.html"><i class="fas fa-users"></i> Người tham gia</a>
            <hr class="bg-secondary mx-3">
            <a href="change-password.html" class="active"><i class="fas fa-key"></i> Đổi mật khẩu</a>
            <a href="login.html" class="text-warning"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-light bg-white border-bottom mb-4 p-2 rounded-3 shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1" style="font-size: 1.1rem;">
                    Hệ thống / <strong id="page-title">Đổi mật khẩu</strong>
                </span>
            </div>
        </nav>

        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 p-4 rounded-4 bg-white">
                    <div class="text-center mb-4">
                        <div class="bg-light-primary d-inline-block p-3 rounded-circle mb-3">
                            <i class="fas fa-lock fa-2x text-primary"></i>
                        </div>
                        <h4 class="fw-bold">Đổi mật khẩu</h4>
                        <p class="text-muted small">Vui lòng nhập mật khẩu hiện tại và mật khẩu mới để cập nhật</p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mật khẩu cũ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-shield-alt text-muted"></i></span>
                            <input id="old" type="password" class="form-control bg-light border-start-0" placeholder="Nhập mật khẩu hiện tại">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Mật khẩu mới</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-key text-muted"></i></span>
                            <input id="newp" type="password" class="form-control bg-light border-start-0" placeholder="Ít nhất 6 ký tự">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Xác nhận mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-double text-muted"></i></span>
                            <input id="confirm" type="password" class="form-control bg-light border-start-0" placeholder="Nhập lại mật khẩu mới">
                        </div>
                    </div>

                    <button class="btn btn-primary w-100 py-2 fw-bold rounded-3 shadow-sm" onclick="change()">
                        <i class="fas fa-save me-2"></i> Cập nhật ngay
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function change() {
    const oldPass = document.getElementById("old").value;
    const newPass = document.getElementById("newp").value;
    const confirmPass = document.getElementById("confirm").value;

    if (!oldPass || !newPass || !confirmPass) {
        alert("Vui lòng điền đầy đủ thông tin!");
        return;
    }

    if (newPass !== confirmPass) {
        alert("Xác nhận mật khẩu mới không khớp!");
        return;
    }

    try {
        const res = await fetch("http://localhost:3000/api/change-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                oldPassword: oldPass,
                newPassword: newPass
            })
        });

        const data = await res.json();
        if (res.ok) {
            alert("✅ " + (data.message || "Đổi mật khẩu thành công!"));
            document.getElementById("old").value = "";
            document.getElementById("newp").value = "";
            document.getElementById("confirm").value = "";
        } else {
            alert("❌ " + (data.error || "Có lỗi xảy ra"));
        }
    } catch (err) {
        console.error("Lỗi:", err);
        alert("Không thể kết nối tới máy chủ!");
    }
}
</script>
</body>
</html>
