<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chỉnh sửa sự kiện - Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/admin-style.css">
</head>

<body>
<div class="admin-wrapper">
    <div class="sidebar shadow">
        <div class="sidebar-header">
            <h5 class="mb-0 text-white"><i class="fas fa-user-shield me-2"></i>ADMIN PANEL</h5>
        </div>
        <div class="py-3">
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="event-manager.html" class="active"><i class="fas fa-calendar-alt"></i> Quản lý sự kiện</a>
            <a href="create-event.html"><i class="fas fa-plus-circle"></i> Tạo sự kiện mới</a>
            <a href="participants.html"><i class="fas fa-users"></i> Người tham gia</a>
            <hr class="bg-secondary mx-3">
            <a href="change-password.html"><i class="fas fa-key"></i> Đổi mật khẩu</a>
            <a href="login.html" class="text-warning"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
        </div>
    </div>

    <div class="main-content">
        <nav class="navbar navbar-light bg-white border-bottom mb-4 p-2 rounded-3 shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1" style="font-size: 1.1rem;">
                    Hệ thống / Quản lý sự kiện / <strong id="page-title">Chỉnh sửa</strong>
                </span>
            </div>
        </nav>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0 p-4 rounded-4 bg-white">
                    <div class="d-flex align-items-center mb-4">
                        <div class="bg-light-primary p-3 rounded-3 me-3" style="background-color: #eef2ff;">
                            <i class="fas fa-edit fa-lg text-primary"></i>
                        </div>
                        <div>
                            <h4 class="fw-bold mb-0">Cập nhật thông tin sự kiện</h4>
                            <p class="text-muted small mb-0">Thay đổi các thông tin cần thiết và nhấn lưu</p>
                        </div>
                    </div>

                    <div class="row g-3">
    <div class="col-md-12">
        <label class="form-label small fw-bold">Tên sự kiện</label>
        <input id="name" class="form-control bg-light border-0 py-2" placeholder="Tên sự kiện">
    </div>

    <div class="col-md-6">
        <label class="form-label small fw-bold">Thời gian bắt đầu</label>
        <input id="time" type="datetime-local" class="form-control bg-light border-0 py-2">
    </div>

    <div class="col-md-6">
        <label class="form-label small fw-bold text-danger">Thời gian kết thúc</label>
        <input id="endTime" type="datetime-local" class="form-control bg-light border-0 py-2">
    </div>

    <div class="col-md-12">
        <label class="form-label small fw-bold">Địa điểm</label>
        <input id="location" class="form-control bg-light border-0 py-2" placeholder="Địa điểm">
    </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Địa điểm</label>
                            <input id="location" class="form-control bg-light border-0 py-2" placeholder="Địa điểm">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label small fw-bold">Mô tả chi tiết</label>
                            <textarea id="desc" class="form-control bg-light border-0" rows="5" placeholder="Nội dung mô tả..."></textarea>
                        </div>

                        <div class="col-md-12 mt-4 d-flex gap-2">
                            <button class="btn btn-primary px-4 py-2 fw-bold rounded-3 shadow-sm" onclick="updateEvent()">
                                <i class="fas fa-save me-2"></i> Lưu thay đổi
                            </button>
                            <button class="btn btn-outline-secondary px-4 py-2 rounded-3" onclick="window.location.href='event-manager.html'">
                                Quay lại
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../assets/js/main.js"></script>

<script>
const API = "http://localhost:3000/api/events"; 
const params = new URLSearchParams(window.location.search);
const id = params.get("id"); 
async function loadEvent() {
    if (!id) {
        alert("ID sự kiện không hợp lệ!");
        window.location.href = "event-manager.html";
        return;
    }

    try {
        const res = await fetch(API);
        const data = await res.json();
        const event = data.find(e => String(e.id) === String(id));

        if (!event) {
            alert("Không tìm thấy sự kiện này!");
            window.location.href = "event-manager.html";
            return;
        }

        document.getElementById("name").value = event.name || "";
        document.getElementById("time").value = event.time || "";
        document.getElementById("endTime").value = event.endTime || ""; 
        document.getElementById("location").value = event.location || "";
        document.getElementById("desc").value = event.description || "";
        
    } catch (err) {
        console.error("Lỗi:", err);
    }
}

async function updateEvent() {
    const name = document.getElementById("name").value;
    const time = document.getElementById("time").value;
    const endTime = document.getElementById("endTime").value; 
    const location = document.getElementById("location").value;
    const description = document.getElementById("desc").value;

    if (!name || !time || !endTime) {
        alert("Vui lòng nhập đầy đủ Tên, Thời gian bắt đầu và kết thúc!");
        return;
    }

    if (new Date(endTime) <= new Date(time)) {
        alert("⚠️ Thời gian kết thúc phải sau thời gian bắt đầu!");
        return;
    }

    try {
        const res = await fetch(`${API}/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                name, 
                time, 
                endTime, 
                location, 
                description 
            })
        });

        if (res.ok) {
            alert("✅ Cập nhật thành công!");
            window.location.href = "event-manager.html";
        }
    } catch (err) {
        alert("Lỗi kết nối server!");
    }

    try {
        const res = await fetch(`${API}/${id}`, {
            method: "PUT",
            headers: { 
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ 
                name, 
                time, 
                location, 
                description 
            })
        });

        if (res.ok) {
            alert("✅ Cập nhật thông tin sự kiện thành công!");
            window.location.href = "event-manager.html";
        } else {
            const errorData = await res.json();
            alert("❌ Lỗi: " + (errorData.message || "Không thể cập nhật sự kiện."));
        }
    } catch (err) {
        console.error("Lỗi kết nối:", err);
        alert("Lỗi kết nối server! Hãy chắc chắn node server.js đang chạy.");
    }
}
window.onload = loadEvent;
</script>

</body>
</html>
