<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Hệ Thống</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { background-color: #f4f7fe; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; }
        .btn-back-home {
            display: inline-flex; align-items: center; padding: 8px 16px; background-color: white; color: #333;
            text-decoration: none !important; border-radius: 10px; font-weight: 600; transition: 0.3s;
            border: 1px solid #ddd; position: absolute; top: 20px; left: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 1000;
        }
        .btn-back-home:hover { background-color: #f8f9fa; transform: translateX(-3px); color: #4361ee; }

        .checkin-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; background: white; z-index: 1; overflow: hidden; }
        .status-icon { width: 60px; height: 60px; background: #eef2ff; color: #4361ee; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.5rem; }
        .form-control { border-radius: 12px; padding: 12px; border: 2px solid #eef2ff; text-align: center; font-weight: 600; }
        .btn-checkin { border-radius: 12px; padding: 12px; font-weight: 700; background: #4361ee; border: none; transition: 0.3s; color: white; }
        .btn-checkin:hover { background: #3046bd; transform: translateY(-2px); color: white; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: none !important; margin-bottom: 20px; background: #f8f9fa; }
        #msg { min-height: 24px; font-weight: 500; padding: 15px; border-radius: 15px; transition: all 0.3s ease; }
        .bg-success-light { background: #d1e7dd; color: #0f5132; border: 1px solid #badbcc; }
        .bg-danger-light { background: #f8d7da; color: #842029; border: 1px solid #f5c2c7; }
        .profile-info { text-align: left; }
        .profile-label { 
    font-size: 0.75rem; 
    text-transform: uppercase; 
    opacity: 0.7; 
    font-weight: 700; 
    display: block; 
    margin-top: 5px; 
}
        .profile-value { font-size: 1rem; font-weight: 700; display: block; }
    </style>
</head>

<body>

<a href="../index.html" class="btn-back-home">
    <i class="fas fa-home me-2"></i> Trang chủ
</a>

<div class="container">
    <div class="card checkin-card p-4 mx-auto text-center">
        <div class="status-icon">
            <i class="fas fa-qrcode"></i>
        </div>
        
        <h4 class="fw-bold mb-1">Máy Quét Điểm Danh</h4>
        <p class="text-muted small mb-4">Hệ thống kiểm soát thời gian thực</p>

        <div id="reader"></div>
        
        <div class="mb-3">
            <input id="code" class="form-control" placeholder="Mã vé hoặc QR code..." autocomplete="off">
        </div>

        <div class="d-grid gap-2">
            <button id="btn-submit" class="btn btn-checkin" onclick="check()">
                <i class="fas fa-check-circle me-2"></i>XÁC NHẬN CHECK-IN
            </button>
            <button class="btn btn-outline-secondary btn-sm border-0" onclick="startScanner()">
                <i class="fas fa-camera me-1"></i> Bật/Tắt Camera quét mã
            </button>
        </div>

        <div id="msg" class="mt-3 d-none"></div>
    </div>
</div>

<script>
let html5QrcodeScanner = null;

function startScanner() {
    if (html5QrcodeScanner) {
        html5QrcodeScanner.clear();
        html5QrcodeScanner = null;
        return;
    }

    html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 10, 
        qrbox: { width: 250, height: 250 },
        rememberLastUsedCamera: true
    });

    html5QrcodeScanner.render((decodedText) => {
        document.getElementById("code").value = decodedText;
        check(); 
    });
}

async function check() {
    const codeInput = document.getElementById("code");
    const msgElement = document.getElementById("msg");
    const btn = document.getElementById("btn-submit");
    const code = codeInput.value.trim();

    if (!code) {
        updateMsg("❌ Vui lòng nhập mã!", "bg-danger-light");
        return;
    }

    try {
        btn.disabled = true;
        updateMsg("⏳ Đang xử lý...", "text-muted");

        const res = await fetch("https://agile-clb-event-management-system.onrender.com/check-ticket", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
        });

        const data = await res.json();
        
        if (res.ok) {
            const profileHTML = `
                <div class="profile-info">
                    <div class="text-center mb-2">
                        <i class="fas fa-check-circle fa-2x text-success"></i>
                        <h6 class="fw-bold mt-1 mb-3">${data.message}</h6>
                    </div>
                    <div class="row">
                        <div class="col-12 mb-2">
                            <span class="profile-label">Sinh viên</span>
                            <span class="profile-value">${data.user.name}</span>
                        </div>
                        <div class="col-6">
                            <span class="profile-label">MSSV</span>
                            <span class="profile-value">${data.user.mssv}</span>
                        </div>
                        <div class="col-6">
                            <span class="profile-label">Thời gian</span>
                            <span class="profile-value">${data.user.checkinTime.split(',')[1]}</span>
                        </div>
                        <div class="col-12 mt-2">
                            <span class="profile-label">Sự kiện đang diễn ra</span>
                            <span class="profile-value text-primary">${data.user.eventName}</span>
                        </div>
                    </div>
                </div>
            `;
            updateMsg(profileHTML, "bg-success-light");
            codeInput.value = ""; 
        } else {
            const errorHTML = `
                <div class="text-center">
                    <i class="fas fa-times-circle fa-2x mb-2"></i>
                    <p class="mb-0 fw-bold">${data.message}</p>
                    ${data.user ? `<hr class="my-2"><small>Họ tên: ${data.user.name}</small>` : ''}
                </div>
            `;
            updateMsg(errorHTML, "bg-danger-light");
        }

    } catch (err) {
        updateMsg("❌ Lỗi kết nối máy chủ!", "bg-danger-light");
    } finally {
        btn.disabled = false;
        codeInput.focus();
    }
}

function updateMsg(content, className) {
    const msg = document.getElementById("msg");
    msg.innerHTML = content; 
    msg.className = "mt-3 mb-0 d-block " + className;
}

document.getElementById("code").addEventListener("keypress", (e) => {
    if (e.key === "Enter") check();
});

window.onload = () => document.getElementById("code").focus();
</script>

</body>
</html>
