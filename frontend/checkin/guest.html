<!DOCTYPE html>
<html lang="vi">
<head>
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Sự Kiện</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        body {
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .checkin-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .card {
            border: none;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: #4e73df;
            color: white;
            text-align: center;
            padding: 30px 20px;
            border: none;
        }
        .icon-box {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
        }
        .card-body {
            padding: 40px 30px;
            background: white;
        }
        .form-control-lg {
            border-radius: 15px;
            border: 2px solid #eaecf4;
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            background: #f8f9fc;
        }
        .form-control-lg:focus {
            border-color: #4e73df;
            background: white;
            box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.1);
        }
        .btn-checkin {
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-checkin:hover {
            background: #224abe;
            transform: translateY(-2px);
        }
        #msg {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            font-weight: 600;
            text-align: center;
        }
        .msg-success { background: #d1e7dd; color: #0f5132; display: block !important; }
        .msg-error { background: #f8d7da; color: #842029; display: block !important; }
    </style>
</head>

<body>

<div class="checkin-container">
    <div class="card">
        <div class="card-header">
            <div class="icon-box">
                <i class="fas fa-qrcode"></i>
            </div>
            <h4 class="fw-bold mb-0">Check-in Sự Kiện</h4>
            <p class="small opacity-75 mb-0 mt-2">Vui lòng quét QR hoặc nhập mã vé</p>
        </div>
        
        <div class="card-body">
            <div class="mb-3">
                <input 
                    type="text" 
                    id="code" 
                    class="form-control form-control-lg" 
                    placeholder="MÃ VÉ CỦA BẠN" 
                    autocomplete="off"
                    autofocus
                />
            </div>

            <button class="btn btn-checkin" id="btn-check" onclick="check()">
                <i class="fas fa-sign-in-alt me-2"></i>XÁC NHẬN
            </button>

            <div id="msg"></div>
            
            <div class="text-center mt-4">
                <small class="text-muted">Hệ thống tự động ghi nhận thời gian</small>
            </div>
        </div>
    </div>
</div>

<script src="checkin.js"></script>

<script>
const inputField = document.getElementById("code");
const msgBox = document.getElementById("msg");

function focusInput() {
    inputField.focus();
}
inputField.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        check();
    }
});
const originalCheck = window.check;

window.check = async function() {
    if (!inputField.value.trim()) return;
    if (typeof originalCheck === "function") {
        await originalCheck();
        const currentMsg = msgBox.innerText;
        if (currentMsg.toLowerCase().includes("thành công") || currentMsg.toLowerCase().includes("ok")) {
            msgBox.className = "msg-success";
        } else {
            msgBox.className = "msg-error";
        }
    }
    inputField.value = "";
    focusInput();
};
window.onload = focusInput;
</script>

</body>
</html>
